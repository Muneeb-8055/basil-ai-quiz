<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AAA Digital — Lead Scraper Requirements Quiz</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f4f6f9; color: #1a202c; line-height: 1.5; padding: 20px; }
  .container { max-width: 820px; margin: 0 auto; }
  header { background: linear-gradient(135deg, #1e3a8a, #1e40af); color: white; padding: 28px; border-radius: 12px; margin-bottom: 20px; }
  header h1 { font-size: 24px; margin-bottom: 6px; }
  header p { font-size: 14px; opacity: 0.9; }
  .meta { background: white; padding: 18px; border-radius: 10px; margin-bottom: 20px; }
  .meta label { display: block; font-weight: 600; margin-bottom: 4px; color: #4a5568; font-size: 13px; }
  .meta input, .meta textarea { width: 100%; padding: 8px 10px; border: 1px solid #cbd5e0; border-radius: 6px; font-size: 14px; font-family: inherit; }
  .section { background: white; border-radius: 10px; padding: 22px; margin-bottom: 16px; }
  .section-header { display: flex; align-items: center; gap: 10px; padding-bottom: 14px; margin-bottom: 16px; border-bottom: 2px solid #e2e8f0; }
  .section-num { background: #1e3a8a; color: white; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 13px; flex-shrink: 0; }
  .section-title { font-size: 16px; font-weight: 700; color: #1e3a8a; }
  .section-subtitle { font-size: 12px; color: #64748b; margin-top: 2px; }
  .question { margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid #f1f5f9; }
  .question:last-child { border-bottom: none; padding-bottom: 0; margin-bottom: 0; }
  .q-num { display: inline-block; background: #eff6ff; color: #1e40af; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 4px; margin-bottom: 4px; }
  .q-text { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
  .q-hint { font-size: 12px; color: #64748b; margin-bottom: 10px; font-style: italic; }
  .options { display: flex; flex-direction: column; gap: 6px; }
  .option { display: flex; align-items: flex-start; gap: 8px; padding: 8px 10px; border: 1px solid #e2e8f0; border-radius: 6px; cursor: pointer; }
  .option:hover { background: #f8fafc; }
  .option input { margin-top: 3px; cursor: pointer; }
  .opt-text { font-size: 13px; flex: 1; }
  .free-input { width: 100%; margin-top: 8px; padding: 8px 10px; border: 2px solid #3b82f6; border-radius: 6px; font-size: 13px; font-family: inherit; background: #eff6ff; display: block; }
  .free-input::placeholder { color: #6b7280; font-style: italic; }
  .actions { position: sticky; bottom: 0; background: white; padding: 16px; border-radius: 10px; box-shadow: 0 -2px 8px rgba(0,0,0,0.08); display: flex; gap: 10px; justify-content: space-between; align-items: center; margin-top: 20px; }
  .progress-text { font-size: 13px; color: #4a5568; }
  .progress-bar { height: 5px; background: #e2e8f0; border-radius: 3px; overflow: hidden; margin-top: 4px; width: 200px; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #3b82f6, #1e3a8a); width: 0%; transition: width 0.3s; }
  .btn { padding: 10px 20px; border: none; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; }
  .btn-secondary { background: white; color: #1e3a8a; border: 1px solid #1e3a8a; }
  .btn-success { background: #059669; color: white; }
  .toast { position: fixed; top: 20px; right: 20px; background: #1e3a8a; color: white; padding: 12px 18px; border-radius: 6px; transform: translateX(400px); transition: transform 0.3s; z-index: 1000; font-size: 13px; }
  .toast.show { transform: translateX(0); }
  .toast.success { background: #059669; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>AAA Digital — Lead Scraper Requirements Quiz</h1>
    <p>60 questions · ~6–7 minutes · every question has a free-text field for your own answer</p>
  </header>

  <div class="meta">
    <label>Your name</label>
    <input type="text" id="respondentName" placeholder="e.g. Haseeb">
    <div style="margin-top: 10px;">
      <label>Anything we should know? (optional)</label>
      <textarea id="respondentNotes" rows="2" placeholder="e.g. Focus on US carriers only, skip Canada"></textarea>
    </div>
  </div>

  <div id="quizContainer"></div>

  <div class="actions">
    <div>
      <div class="progress-text"><span id="progressText">0 of 50 answered</span></div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    </div>
    <div style="display: flex; gap: 8px;">
      <button class="btn btn-secondary" onclick="saveProgress()">Save</button>
      <button class="btn btn-success" onclick="submitQuiz()">Submit & Download</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

let answers = {};
let otherTexts = {};

function renderQuiz() {
  const container = document.getElementById('quizContainer');
  let qNum = 0;
  quizData.forEach((section, sIdx) => {
    const sectionEl = document.createElement('div');
    sectionEl.className = 'section';
    sectionEl.innerHTML = `<div class="section-header"><div class="section-num">${sIdx + 1}</div><div><div class="section-title">${section.title}</div><div class="section-subtitle">${section.subtitle}</div></div></div>`;
    section.questions.forEach((q) => {
      qNum++;
      const qEl = document.createElement('div');
      qEl.className = 'question';
      const optionsHtml = q.options.map((opt, i) => {
        const letter = String.fromCharCode(65 + i);
        return `<label class="option"><input type="radio" name="${q.id}" value="${letter}" onchange="handleAnswer('${q.id}', '${letter}')"><span class="opt-text">${letter}. ${opt}</span></label>`;
      }).join('');
      const otherOptionHtml = `<label class="option"><input type="radio" name="${q.id}" value="OTHER" onchange="handleAnswer('${q.id}', 'OTHER')"><span class="opt-text">Other (write your own answer)</span></label>`;
      const freeInputHtml = `<textarea class="free-input" id="other-${q.id}" rows="2" placeholder="Type your own answer here, or use this to add detail to a selected option..." oninput="handleOtherText('${q.id}', this.value)"></textarea>`;
      qEl.innerHTML = `<span class="q-num">Q${qNum}</span><div class="q-text">${q.text}</div>${q.hint ? `<div class="q-hint">${q.hint}</div>` : ''}<div class="options" data-qid="${q.id}">${optionsHtml}${otherOptionHtml}</div>${freeInputHtml}`;
      sectionEl.appendChild(qEl);
    });
    container.appendChild(sectionEl);
  });
}

function handleAnswer(qid, value) {
  answers[qid] = value;
  updateProgress();
}

function handleOtherText(qid, value) { otherTexts[qid] = value; }

function updateProgress() {
  const total = quizData.reduce((sum, s) => sum + s.questions.length, 0);
  const answered = Object.keys(answers).length;
  document.getElementById('progressText').textContent = `${answered} of ${total} answered`;
  document.getElementById('progressFill').style.width = `${(answered / total) * 100}%`;
}

function getFullAnswers() {
  const result = {};
  for (const qid in answers) {
    result[qid] = { selected: answers[qid], otherText: otherTexts[qid] || null };
  }
  return result;
}

function showToast(msg, type = '') {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = 'toast show ' + type;
  setTimeout(() => { toast.className = 'toast'; }, 3000);
}

function saveProgress() {
  const data = { timestamp: new Date().toISOString(), respondent: document.getElementById('respondentName').value || 'Anonymous', notes: document.getElementById('respondentNotes').value || '', answers: getFullAnswers(), completed: false };
  localStorage.setItem('aaa_quiz_progress', JSON.stringify(data));
  showToast('Progress saved', 'success');
}

function submitQuiz() {
  const total = quizData.reduce((sum, s) => sum + s.questions.length, 0);
  const answered = Object.keys(answers).length;
  if (answered < total && !confirm(`Answered ${answered} of ${total}. Submit anyway?`)) return;
  const data = { timestamp: new Date().toISOString(), respondent: document.getElementById('respondentName').value || 'Anonymous', notes: document.getElementById('respondentNotes').value || '', answers: getFullAnswers(), completed: true, totalQuestions: total, answeredCount: answered };
  const jsonBlob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const jsonLink = document.createElement('a');
  jsonLink.href = URL.createObjectURL(jsonBlob);
  jsonLink.download = `aaa-quiz-${new Date().toISOString().split('T')[0]}.json`;
  jsonLink.click();
  generatePDF(data);
  showToast('Files downloaded', 'success');
}

function generatePDF(data) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  let y = 20;
  const margin = 20;
  const maxWidth = doc.internal.pageSize.width - 2 * margin;
  doc.setFontSize(16); doc.setFont(undefined, 'bold');
  doc.text('AAA Lead Scraper Quiz', margin, y); y += 10;
  doc.setFontSize(9); doc.setFont(undefined, 'normal');
  doc.text(`Respondent: ${data.respondent} | ${new Date(data.timestamp).toLocaleString()} | ${data.answeredCount}/${data.totalQuestions} answered`, margin, y); y += 8;
  if (data.notes) { const l = doc.splitTextToSize(`Notes: ${data.notes}`, maxWidth); doc.text(l, margin, y); y += l.length * 4 + 4; }
  let qNum = 0;
  quizData.forEach((section, sIdx) => {
    if (y > 260) { doc.addPage(); y = 20; }
    doc.setFontSize(12); doc.setFont(undefined, 'bold');
    doc.text(section.title, margin, y); y += 7;
    section.questions.forEach((q) => {
      qNum++;
      if (y > 270) { doc.addPage(); y = 20; }
      doc.setFontSize(9); doc.setFont(undefined, 'bold');
      const ql = doc.splitTextToSize(`Q${qNum}. ${q.text}`, maxWidth);
      doc.text(ql, margin, y); y += ql.length * 4;
      doc.setFont(undefined, 'normal');
      const ans = data.answers[q.id];
      if (ans) {
        if (ans.otherText) {
          const al = doc.splitTextToSize(`A (free text): ${ans.otherText}`, maxWidth - 5);
          doc.text(al, margin + 4, y); y += al.length * 4;
        }
        if (ans.selected && ans.selected !== 'OTHER') {
          const idx = ans.selected.charCodeAt(0) - 65;
          const txt = idx >= 0 && idx < q.options.length ? `${ans.selected}. ${q.options[idx]}` : ans.selected;
          const al = doc.splitTextToSize(`A (option): ${txt}`, maxWidth - 5);
          doc.text(al, margin + 4, y); y += al.length * 4;
        } else if (ans.selected === 'OTHER' && !ans.otherText) {
          const al = doc.splitTextToSize(`A: OTHER (no text provided)`, maxWidth - 5);
          doc.text(al, margin + 4, y); y += al.length * 4;
        }
      } else {
        doc.setTextColor(150); doc.text(`A: [not answered]`, margin + 4, y); doc.setTextColor(0);
      }
      y += 4;
    });
    y += 4;
  });
  doc.save(`aaa-quiz-${new Date().toISOString().split('T')[0]}.pdf`);
}

renderQuiz();
updateProgress();
</script>
